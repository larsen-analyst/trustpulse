<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compare Trusts — TrustPulse</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f12;--surface:#161a1f;--surface2:#1e2328;--border:#2a2f36;--text:#e8eaed;--muted:#7a8694;--red:#ff4d4d;--red-bg:rgba(255,77,77,.1);--amber:#ffb347;--amber-bg:rgba(255,179,71,.1);--green:#3ddc84;--green-bg:rgba(61,220,132,.1);--accent:#4d9fff;--accent-bg:rgba(77,159,255,.1);--font-mono:'DM Mono',monospace;--font-sans:'DM Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:14px}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;height:52px;gap:2rem;position:sticky;top:0;z-index:100}
.nav-brand{font-family:var(--font-mono);font-size:13px;color:var(--accent);text-decoration:none}
.nav-back{color:var(--muted);text-decoration:none;font-size:13px}
.nav-back:hover{color:var(--text)}
main{max-width:1280px;margin:0 auto;padding:2rem}
.page-header{margin-bottom:2rem}
.page-header h1{font-size:22px;font-weight:500;margin-bottom:4px}
.page-header p{color:var(--muted);font-size:13px}

/* Trust selector */
.selector-bar{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.25rem;margin-bottom:2rem}
.selector-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.selector-row{display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center}
.trust-search{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-family:var(--font-sans);font-size:13px;outline:none;width:280px}
.trust-search:focus{border-color:var(--accent)}
.search-results{position:absolute;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:6px;width:280px;max-height:220px;overflow-y:auto;margin-top:2px}
.search-result-item{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:var(--surface2)}
.search-result-code{font-family:var(--font-mono);font-size:11px;color:var(--muted)}
.selected-trust-tags{display:flex;gap:6px;flex-wrap:wrap}
.trust-tag{display:flex;align-items:center;gap:6px;background:var(--accent-bg);border:1px solid rgba(77,159,255,.2);border-radius:4px;padding:4px 10px;font-size:12px;color:var(--accent)}
.trust-tag button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:0}
.trust-tag button:hover{color:var(--red)}
.compare-btn{background:var(--accent);color:#fff;border:none;padding:8px 18px;border-radius:6px;font-family:var(--font-sans);font-size:13px;cursor:pointer;transition:opacity .15s}
.compare-btn:hover{opacity:.85}
.compare-btn:disabled{opacity:.4;cursor:not-allowed}
.search-wrap{position:relative}

/* Comparison table */
.compare-table-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--surface2)}
th{padding:12px 16px;text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);white-space:nowrap}
th.trust-col{min-width:200px}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.015)}
td{padding:10px 16px;vertical-align:middle}
td.metric-name{color:var(--muted);font-size:12px;white-space:nowrap}
td.metric-val{font-family:var(--font-mono);font-weight:500}
.rag{display:inline-block;padding:2px 8px;border-radius:3px;font-family:var(--font-mono);font-size:11px;font-weight:500}
.rag-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,77,77,.2)}
.rag-amber{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(255,179,71,.2)}
.rag-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(61,220,132,.2)}
.rag-unknown{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.section-row td{background:var(--surface2);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.07em;padding:6px 16px;font-weight:500}
.trust-link{color:var(--text);text-decoration:none;font-weight:500;font-size:14px;display:block;margin-bottom:2px}
.trust-link:hover{color:var(--accent)}
.trust-sub{font-size:11px;color:var(--muted)}
.empty-state{padding:4rem 2rem;text-align:center;color:var(--muted)}
.empty-state p{font-size:15px;margin-bottom:8px}
.empty-state small{font-size:12px}
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/">TRUSTPULSE</a>
  <a class="nav-back" href="/">← Dashboard</a>
</nav>

<main>
  <div class="page-header">
    <h1>Compare Trusts</h1>
    <p>Select up to 5 trusts for side-by-side comparison across all domains and metrics.</p>
  </div>

  <!-- Selector -->
  <div class="selector-bar">
    <div class="selector-label">Select trusts to compare</div>
    <div class="selector-row">
      <div class="search-wrap">
        <input type="text" id="trust-input" class="trust-search" placeholder="Search trust name or code…" autocomplete="off">
        <div class="search-results" id="search-results" style="display:none"></div>
      </div>
      <div class="selected-trust-tags" id="selected-tags"></div>
      <button class="compare-btn" id="compare-btn" onclick="doCompare()">Compare →</button>
    </div>
  </div>

  <!-- Comparison table built by JS below -->
  <div id="compare-output">
    <div class="empty-state">
      <p>No trusts selected.</p>
      <small>Search for trusts above and click Compare.</small>
    </div>
  </div>
</main>

<script>
const ALL_TRUSTS = {{ all_trusts|safe }};
let selected = {{ selected_codes|tojson }};

function ragClass(r){return r==='Red'?'rag-red':r==='Amber'?'rag-amber':r==='Green'?'rag-green':'rag-unknown'}

function renderTags(){
  const container=document.getElementById('selected-tags');
  container.innerHTML=selected.map(code=>{
    const t=ALL_TRUSTS.find(x=>x.org_code===code);
    const name=t?(t.org_name||code):code;
    return `<span class="trust-tag"><span>${name.length>30?name.slice(0,28)+'…':name}</span><button onclick="removeSelected('${code}')">×</button></span>`;
  }).join('');
  document.getElementById('compare-btn').disabled=selected.length<2;
}

function removeSelected(code){selected=selected.filter(c=>c!==code);renderTags();}

function doCompare(){
  if(selected.length<2)return;
  const url='/compare?'+selected.map(c=>'org='+encodeURIComponent(c)).join('&');
  window.location.href=url;
}

// Search
let searchTimeout;
document.getElementById('trust-input').addEventListener('input',function(){
  clearTimeout(searchTimeout);
  searchTimeout=setTimeout(()=>{
    const q=this.value.toLowerCase().trim();
    const res=document.getElementById('search-results');
    if(!q){res.style.display='none';return;}
    const matches=ALL_TRUSTS.filter(t=>
      (t.org_name||'').toLowerCase().includes(q)||(t.org_code||'').toLowerCase().includes(q)
    ).slice(0,8);
    if(!matches.length){res.style.display='none';return;}
    res.innerHTML=matches.map(t=>`
      <div class="search-result-item" onclick="addTrust('${t.org_code}')">
        <span>${t.org_name||t.org_code}</span>
        <span class="search-result-code">${t.org_code}</span>
      </div>`).join('');
    res.style.display='block';
  },150);
});

function addTrust(code){
  if(selected.length>=5){alert('Maximum 5 trusts');return;}
  if(!selected.includes(code))selected.push(code);
  document.getElementById('trust-input').value='';
  document.getElementById('search-results').style.display='none';
  renderTags();
}

document.addEventListener('click',e=>{
  if(!e.target.closest('.search-wrap'))
    document.getElementById('search-results').style.display='none';
});

// Pre-populate from URL
{% if selected_codes %}
selected = {{ selected_codes|tojson }};
{% endif %}
renderTags();
</script>

{% if trusts %}
<script>
// Build compare table from server-rendered trust data
const TRUSTS = {{ trusts_json|safe }};

function fmtPct(v,mult){if(v==null)return'<span style="color:var(--muted)">N/A</span>';return((v*(mult||1))).toFixed(1)+'%'}
function fmtNum(v,d){if(v==null)return'<span style="color:var(--muted)">N/A</span>';return parseFloat(v).toFixed(d||1)}
function fmtCost(v){if(!v)return'<span style="color:var(--muted)">N/A</span>';if(v>=1e9)return'£'+(v/1e9).toFixed(1)+'bn';if(v>=1e6)return'£'+(v/1e6).toFixed(1)+'m';return'£'+(v/1e3).toFixed(0)+'k'}
function rag(v){if(!v)return'<span class="rag rag-unknown">N/A</span>';return`<span class="rag ${ragClass(v)}">${v}</span>`}

const ROWS = [
  {section:'Overall'},
  {label:'Composite Score', fn: t=>fmtNum(t.composite_score)},
  {label:'Overall RAG',     fn: t=>rag(t.overall_rag)},
  {label:'Red Flags',       fn: t=>fmtNum(t.red_flag_count,0)},
  {label:'Est. Annual Cost',fn: t=>fmtCost(t.est_annual_inefficiency_gbp)},
  {section:'Domain Scores (0–100, higher = worse)'},
  {label:'D1 Urgent & Emergency Care', fn: t=>`${fmtNum(t.d1_score)} ${rag(t.d1_rag)}`},
  {label:'D2 Elective Care',           fn: t=>`${fmtNum(t.d2_score)} ${rag(t.d2_rag)}`},
  {label:'D3 Workforce',               fn: t=>`${fmtNum(t.d3_score)} ${rag(t.d3_rag)}`},
  {label:'D4 Finance & Productivity',  fn: t=>`${fmtNum(t.d4_score)} ${rag(t.d4_rag)}`},
  {label:'D5 Quality & Safety',        fn: t=>`${fmtNum(t.d5_score)} ${rag(t.d5_rag)}`},
  {section:'A&E'},
  {label:'4hr Performance (Type 1)',  fn: t=>fmtPct(t.ae_type1_4hr_performance,100)+' '+rag(t.rag_4hr_type1)},
  {label:'12hr Breach Rate',          fn: t=>fmtPct(t.ae_12hr_breach_rate,100)+' '+rag(t.rag_12hr)},
  {section:'Workforce'},
  {label:'Sickness Rate',             fn: t=>fmtNum(t.sickness_rate_overall_3m_avg)+'% '+rag(t.rag_sickness)},
  {section:'Beds & Discharge'},
  {label:'Bed Occupancy',             fn: t=>fmtPct(t.beds_occupancy_rate_3m_avg,100)+' '+rag(t.rag_beds_occupancy)},
  {label:'Delayed Discharge Days',    fn: t=>fmtNum(t.discharge_total_delayed_bed_days_3m_avg,0)+' '+rag(t.rag_delayed_discharge)},
  {section:'RTT'},
  {label:'18-Week Performance',       fn: t=>fmtPct(t.pct_within_18_weeks_3m_avg,100)+' '+rag(t.rag_rtt_18wk)},
  {label:'52-Week Waiters per 1000',  fn: t=>fmtNum(t.waiters_over52_per1000)+' '+rag(t.rag_rtt_52wk)},
  {section:'Quality & Safety'},
  {label:'CQC Overall',               fn: t=>( t.rating_overall||'N/A')+' '+rag(t.rag_cqc_overall)},
  {label:'Oversight Segment',         fn: t=>fmtNum(t.overall_adjusted_segment,0)+' '+rag(t.rag_oversight_segment)},
  {section:'Ambulance (Winter 2025/26)'},
  {label:'>60min Handover Rate',      fn: t=>fmtPct(t.amb_over60_pct_3m_avg,100)+' '+rag(t.rag_amb_60min)},
];

const output=document.getElementById('compare-output');
let html='<div class="compare-table-wrap"><table><thead><tr><th>Metric</th>';
TRUSTS.forEach(t=>{
  html+=`<th class="trust-col"><a class="trust-link" href="/trust/${t.org_code}">${t.org_name||t.org_code}</a><span class="trust-sub">${t.org_code}${t.Region?' · '+t.Region:''}</span></th>`;
});
html+='</tr></thead><tbody>';

ROWS.forEach(row=>{
  if(row.section){
    html+=`<tr class="section-row"><td colspan="${TRUSTS.length+1}">${row.section}</td></tr>`;
    return;
  }
  html+='<tr><td class="metric-name">'+row.label+'</td>';
  TRUSTS.forEach(t=>{html+=`<td class="metric-val">${row.fn(t)}</td>`;});
  html+='</tr>';
});

html+='</tbody></table></div>';
output.innerHTML=html;
</script>
{% endif %}
</body>
</html>
